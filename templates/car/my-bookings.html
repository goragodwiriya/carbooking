<aside data-component="sidebar"></aside>
<div class="main-content">
  <div>
    <header data-component="topbar"></header>
    <main class="content">
      <div class="card-groups">
        <header>
          <div>
            <h1 class="icon-car" data-i18n>My bookings</h1>
            <p data-i18n>View and manage your own vehicle reservations</p>
          </div>
          <div class="header-actions">
            <a class="btn btn-primary icon-new" href="/car-booking" data-i18n>Book a car</a>
          </div>
        </header>
        <div class="content-body">
          <div class="tablebody">
            <table class="table border fullwidth" data-table="myBookings" data-source="api/car/mybookings" data-default-sort="created_at desc" data-page-size="25"
                   data-search-columns="vehicle_number,detail" data-action-url="api/car/mybookings/action" data-row-actions='{
                                "view":{
                                  "title":"View",
                                  "className":"btn btn-warning icon-search"
                                },
                                "edit": {
                                  "title": "Edit",
                                  "className": "btn btn-success icon-edit",
                                  "condition":"${can_edit == true}"
                                },
                                "cancel": {
                                  "title": "Cancel",
                                  "className": "btn btn-danger icon-ban",
                                  "confirm": "{LNG_Confirm cancellation}",
                                  "condition":"${can_cancel == true}"
                                }
                              }'>
              <thead>
                <tr>
                  <th data-field="vehicle_number" data-sort="vehicle_number" data-formatter="formatVehicleWithImage" data-i18n>{LNG_Vehicle}</th>
                  <th data-field="detail" data-template="<span class='two_line'>${detail}</span>" data-i18n>{LNG_Details}</th>
                  <th data-field="begin" data-sort="begin" class="center" data-cell-class="center" data-format="datetime" data-i18n>{LNG_Start date}</th>
                  <th data-field="end" data-sort="end" class="center" data-cell-class="center" data-format="datetime" data-i18n>{LNG_End date}</th>
                  <th data-field="chauffeur" data-filter="true" data-type="select" data-format="lookup" data-i18n>{LNG_Driver}</th>
                  <th data-field="created_at" data-sort="created_at" class="center" data-cell-class="center" data-format="datetime" data-i18n>{LNG_Created}</th>
                  <th data-field="status" data-filter="true" data-type="select" sort="status" class="center" data-cell-class="center" data-formatter="formatTableOptionStatus"
                      data-i18n>{LNG_Status}</th>
                  <th data-field="reason" data-template="<span class='two_line'>${reason}</span>" data-i18n>{LNG_Reason}</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <footer class="footer">
    <p class="center">&copy; 2026 Admin Framework - Powered by <a href="https://nowjs.net">Now.js</a></p>
  </footer>
</div>
