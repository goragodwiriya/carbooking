<aside data-component="sidebar"></aside>
<div class="main-content">
    <div>
        <header data-component="topbar"></header>
        <main class="content">
            <div class="card-groups">
                <header>
                    <div>
                        <h1 class="icon-valid" data-i18n>Car approvals</h1>
                        <p data-i18n>Review pending and processed vehicle reservation requests</p>
                    </div>
                </header>
                <div class="content-body">
                    <form data-table-filter="carApprovals" class="table_nav">
                        <div>
                            <label for="pageSize" data-i18n>Show</label>
                            <span class="form-control">
                                <select name="pageSize">
                                    <option value="10" data-i18n>10 {LNG_entries}</option>
                                    <option value="25" data-i18n>25 {LNG_entries}</option>
                                    <option value="50" data-i18n>50 {LNG_entries}</option>
                                    <option value="100" data-i18n>100 {LNG_entries}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="member_id" data-i18n>{LNG_Requester}</label>
                            <span class="form-control">
                                <select id="member_id" name="member_id" data-attr="value:member_id">
                                    <option value="" data-i18n>{LNG_All items}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="department" data-i18n>{LNG_Department}</label>
                            <span class="form-control">
                                <select id="department" name="department" data-attr="value:department">
                                    <option value="" data-i18n>{LNG_All items}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="vehicle_id" data-i18n>{LNG_Vehicle}</label>
                            <span class="form-control">
                                <select id="vehicle_id" name="vehicle_id" data-attr="value:vehicle_id">
                                    <option value="" data-i18n>{LNG_All items}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="chauffeur" data-i18n>{LNG_Driver}</label>
                            <span class="form-control">
                                <select id="chauffeur" name="chauffeur" data-attr="value:chauffeur">
                                    <option value="" data-i18n>{LNG_All items}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="status" data-i18n>{LNG_Status}</label>
                            <span class="form-control">
                                <select id="status" name="status" data-attr="value:status">
                                    <option value="" data-i18n>{LNG_All items}</option>
                                </select>
                            </span>
                        </div>
                        <div>
                            <label for="from" data-i18n>From</label>
                            <span class="form-control">
                                <input type="date" name="from" id="from" data-attr="value:from">
                            </span>
                        </div>
                        <div>
                            <label for="to" data-i18n>To</label>
                            <span class="form-control">
                                <input type="date" name="to" id="to" data-attr="value:to">
                            </span>
                        </div>
                        <input type="search" name="search" placeholder="{LNG_Search}...">
                    </form>
                    <div class="tablebody">
                        <table class="table border fullwidth" data-table="carApprovals" data-source="api/car/approvals" data-default-sort="created_at desc" data-page-size="25"
                               data-search-columns="reason,detail" data-show-checkbox="true" data-action-url="api/car/approvals/action" data-row-actions='{
                                "review": {
                                  "label": "Review",
                                  "className": "btn btn-warning icon-search"
                                }
                              }'>
                            <thead>
                                <tr>
                                    <th data-field="member_id" data-sort="member_id" data-format="lookup" data-i18n>{LNG_Requester}</th>
                                    <th data-field="department" data-format="lookup" data-i18n>{LNG_Department}</th>
                                    <th data-field="vehicle_id" data-sort="vehicle_id" data-formatter="formatVehicleWithImage" data-i18n>{LNG_Vehicle}</th>
                                    <th data-field="detail" data-template="<span class='two_line'>${detail}</span>" data-i18n>{LNG_Detail}</th>
                                    <th data-field="begin" data-sort="begin" class="center" data-cell-class="center" data-format="datetime" data-i18n>{LNG_Start date}</th>
                                    <th data-field="end" data-sort="end" class="center" data-cell-class="center" data-format="datetime" data-i18n>{LNG_End date}</th>
                                    <th data-field="chauffeur" data-format="lookup" class="center" data-cell-class="center" data-i18n>{LNG_Driver}</th>
                                    <th data-field="status" data-sort="status" data-formatter="formatTableOptionStatus" class="center" data-cell-class="center" data-i18n>
                                        {LNG_Status}</th>
                                    <th data-field="reason" data-template="<span class='two_line'>${reason}</span>" data-i18n>{LNG_Reason}</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <footer class="footer">
        <p class="center">&copy; 2026 Admin Framework - Powered by <a href="https://nowjs.net">Now.js</a></p>
    </footer>
</div>
